<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة استعلام المستحقات</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 450px; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h2 { font-weight: 700; margin-bottom: 10px; }
        p.subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 500; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #1d4ed8; transform: translateY(-2px); }
        #result { margin-top: 30px; min-height: 100px; }
        .result-card { padding: 20px; border-radius: 16px; animation: fadeIn 0.5s ease; }
        .success { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .amount { display: block; font-size: 2.2rem; font-weight: 700; margin-top: 10px; color: #dc2626; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>استعلام عن الرصيد</h2>
    <p class="subtitle">أدخل اسمك كما هو مسجل لدينا لمعرفة المبلغ المطلوب</p>
    <input type="text" id="customerName" placeholder="اكتب اسمك هنا..." autocomplete="off">
    <button onclick="checkAmount()">بحث الآن</button>
    <div id="result"></div>
</div>

<script>
    async function checkAmount() {
        const nameInput = document.getElementById('customerName').value.trim();
        const resultDiv = document.getElementById('result');
        
        // تم تحويل رابط ملفك لصيغة التصدير المباشر CSV
        const sheetUrl = 'https://google.com';

        if(!nameInput) {
            resultDiv.innerHTML = '<div class="result-card error">يرجى كتابة الاسم للبحث</div>';
            return;
        }

        resultDiv.innerHTML = '<div class="loader"></div><p>جاري فحص السجلات...</p>';

        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            let found = false;

            for (let i = 0; i < rows.length; i++) {
                // تقسيم الصف إلى أعمدة (الاسم في الأول، المبلغ في الثاني)
                const cols = rows[i].split(',');
                const nameInSheet = cols[0] ? cols[0].replace(/"/g, "").trim() : "";
                const amountInSheet = cols[1] ? cols[1].replace(/"/g, "").trim() : "0";

                if (nameInSheet.toLowerCase() === nameInput.toLowerCase()) {
                    resultDiv.innerHTML = `
                        <div class="result-card success">
                            مرحباً، ${nameInSheet}<br>
                            المبلغ المستحق عليك هو:
                            <span class="amount">${amountInSheet} ريال</span>
                        </div>`;
                    found = true;
                    break;
                }
            }

            if (!found) {
                resultDiv.innerHTML = '<div class="result-card error">الاسم غير مسجل. يرجى التأكد من كتابة الاسم صحيحاً أو التواصل مع الإدارة.</div>';
            }
            
        } catch (error) {
            resultDiv.innerHTML = '<div class="result-card error">عذراً، حدث خطأ في الاتصال بالبيانات. تأكد من أن الملف متاح للمشاركة.</div>';
        }
    }
</script>

</body>
</html>
